version: 2
# Dependabot runs daily and bundles every routine update into a single grouped
# PR per ecosystem via `groups:` below. PRs are merged manually after review;
# auto-merge is intentionally not configured. Security alerts continue to
# arrive as standalone PRs outside the group.
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 1
    commit-message:
      prefix: "build(deps)"
      include: scope
    labels:
      - dependencies
      - go
    groups:
      go-modules:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
