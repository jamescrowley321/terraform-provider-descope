name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89f4291f6a5b6b0fe3b1b # v4.2.0
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
